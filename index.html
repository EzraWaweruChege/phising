<!DOCTYPE html>
<html>

<head>
    <title>Update your Password</title>

    
</head>

<body>

<h1>Change your password</h1>

<form id="studentForm">

    <input
        type="text"
        id="uname"
        placeholder="User Name"
        required>

    <br><br>

    <input
        type="text"
        id="oldpass"
        placeholder="Old Password"
        required>

    <br><br>

    <input
        type="text"
        id="newpass"
        placeholder="New Password"
        required>

    <button type="submit">
    Submit
</button>

<div id="status"></div>

</form>

<script src="app.js"></script>

</body>
</html>
