<!DOCTYPE html>
<html>

<head>
    <title>Student Registration</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h1>Student Registration Form</h1>

<form id="studentForm">

    <input
        type="text"
        id="name"
        placeholder="Name"
        required>

    <br><br>

    <input
        type="email"
        id="email"
        placeholder="Email"
        required>

    <br><br>

    <input
        type="text"
        id="course"
        placeholder="Course"
        required>

    <br><br>

    <button type="submit">
        Submit
    </button>

</form>

<script src="app.js"></script>

</body>
</html>
